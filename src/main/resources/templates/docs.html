<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SimpleCD Docs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f7f3;
            color: #0f2f29;
            padding: 20px;
        }

        .wrap {
            max-width: 880px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border: 1px solid #cee1d9;
            border-radius: 16px;
            box-shadow: 0 12px 26px rgba(15, 47, 41, 0.08);
            padding: 24px;
        }

        .head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .head img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        h1 { margin: 0; }

        ul { color: #4f6660; line-height: 1.6; }

        a {
            color: #14674f;
            font-weight: 700;
            text-decoration: none;
        }

        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="head">
            <img src="/images/logo.png" alt="SimpleCD Logo">
            <h1>Docs</h1>
        </div>
        <ul>
            <li>Sign in with admin credentials.</li>
            <li>Open dashboard and add Git repository URL and branch.</li>
            <li>Start build and monitor pipeline status.</li>
            <li>Open log stream for detailed output.</li>
            <li>Check artifact path in build history.</li>
        </ul>
        <a href="/login">Back to Home</a>
    </div>
</div>
</body>
</html>
