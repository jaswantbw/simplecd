<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SimpleCD Logs</title>
    <style>
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .logo { height: 60px; }
    </style>
</head>
<body>

<div class="header">
    <img src="/images/logo.png" alt="Logo" class="logo">
    <h1>Build Logs</h1>
</div>

<p>
    <b>Job ID:</b> <span th:text="${job.jobId}"></span><br>
    <b>Status:</b> <span th:text="${job.status}"></span>
</p>

<pre id="logBox"
     style="background:#111;color:#0f0;padding:15px;height:500px;overflow:auto;">
Loading logs...
</pre>

<a href="/">Back</a>

<script th:inline="javascript">
    const jobId = /*[[${job.jobId}]]*/ "";

    function loadLogs() {
        fetch("/api/logs/" + jobId)
            .then(response => response.text())
            .then(data => {
                const logBox = document.getElementById("logBox");
                logBox.textContent = data;
                logBox.scrollTop = logBox.scrollHeight;
            });
    }

    setInterval(loadLogs, 2000);
    loadLogs();
</script>

</body>
</html>
