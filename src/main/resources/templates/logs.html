<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SimpleCD Logs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #dee6eb;
            --panel: #ffffff;
            --text: #111827;
            --muted: #6D7F8B;
            --accent: #0DADEA;
            --accent-dark: #103d66;
            --border: #E5E7EB;
            --green: #18BE94;
            --red: #E96D76;
            --blue: #0DADEA;
            --gray: #CCD6DD;
            --yellow: #f4c030;
            --orange: #f4c030;
            --purple: #766f94;
        }

        * { box-sizing: border-box; }
        html { font-size: 20px; }

        body {
            margin: 0;
            font-family: "Heebo", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
        }

        .container {
            max-width: 1150px;
            margin: 0 auto;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.1);
            padding: 18px;
            margin-bottom: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .logo { height: 58px; }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .logout {
            margin-left: auto;
            color: var(--muted);
            font-weight: 600;
            text-decoration: none;
        }

        .logout:hover { text-decoration: underline; }

        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 8px;
        }

        .tab-link {
            text-decoration: none;
            color: var(--muted);
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 10px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .tab-link:hover {
            background: rgba(13, 173, 234, 0.08);
        }

        .meta {
            margin: 0 0 12px;
            color: var(--muted);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            vertical-align: middle;
        }

        .badge-success { background: #DCFCE7; color: var(--green); border: 1px solid #BBF7D0; }
        .badge-failed { background: #FEE2E2; color: var(--red); border: 1px solid #FECACA; }
        .badge-running { background: #DBEAFE; color: var(--blue); border: 1px solid #BFDBFE; }
        .badge-pending { background: #F3F4F6; color: var(--gray); border: 1px solid #E5E7EB; }
        .badge-aborted { background: #FEF3C7; color: var(--yellow); border: 1px solid #FDE68A; }
        .badge-unstable { background: #FEF3C7; color: var(--orange); border: 1px solid #FDE68A; }
        .badge-blocked { background: #F3F4F6; color: var(--gray); border: 1px solid #E5E7EB; }
        .badge-cancelled { background: #F3F4F6; color: var(--gray); border: 1px solid #E5E7EB; }
        .badge-draft { background: #ede9fe; color: var(--purple); border: 1px solid #ddd6fe; }

        #logBox {
            background: #111827;
            color: #f9fafb;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 14px;
            height: 500px;
            overflow: auto;
            margin: 0;
            font-family: Consolas, "Courier New", monospace;
        }

        .back-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--accent-dark);
            font-weight: 700;
        }

        @media (max-width: 780px) {
            body { padding: 12px; }

            .header h1 { font-size: 1.25rem; }

            .logo { height: 48px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <img src="/images/logo.png" alt="Logo" class="logo">
            <h1>Build Logs</h1>
            <a href="/logout" class="logout">Logout</a>
        </div>

        <div class="nav-tabs">
            <a href="/#code-repository" class="tab-link">Code Repository</a>
            <a href="/#pipeline" class="tab-link">Pipeline</a>
            <a href="/#artifact" class="tab-link">Artifact</a>
            <a href="/#log" class="tab-link">Log</a>
        </div>
    </div>

    <div class="card">
        <p class="meta">
            <b>Job ID:</b> <span th:text="${job.jobId}"></span><br>
            <b>Status:</b>
            <span th:classappend="${job.status.name() == 'SUCCESS'} ? 'badge-success' : (${job.status.name() == 'FAILED'} ? 'badge-failed' : ((job.status.name() == 'RUNNING' or job.status.name() == 'IN_PROGRESS') ? 'badge-running' : (job.status.name() == 'ABORTED' ? 'badge-aborted' : (job.status.name() == 'UNSTABLE' ? 'badge-unstable' : ((job.status.name() == 'BLOCKED') ? 'badge-blocked' : ((job.status.name() == 'CANCELLED') ? 'badge-cancelled' : (job.status.name() == 'DRAFT' ? 'badge-draft' : 'badge-pending')))))))"
                  class="badge"
                  th:text="${job.status}"></span>
        </p>

        <pre id="logBox">Loading logs...</pre>

        <a href="/" class="back-link">Back</a>
    </div>
</div>

<script th:inline="javascript">
    const jobId = /*[[${job.jobId}]]*/ "";

    function loadLogs() {
        fetch("/api/logs/" + jobId)
            .then(response => response.text())
            .then(data => {
                const logBox = document.getElementById("logBox");
                logBox.textContent = data;
                logBox.scrollTop = logBox.scrollHeight;
            });
    }

    setInterval(loadLogs, 2000);
    loadLogs();
</script>

</body>
</html>
