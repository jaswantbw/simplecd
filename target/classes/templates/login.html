<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SimpleCD Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #f4f7f6;
            --panel: #ffffff;
            --text: #18312d;
            --muted: #5d746f;
            --accent: #1f7a64;
            --accent-dark: #155646;
            --border: #d2dfdb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 12% 18%, #dff2ea 0%, #dff2ea 22%, transparent 23%),
                radial-gradient(circle at 88% 82%, #e7f5ef 0%, #e7f5ef 20%, transparent 21%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-shell {
            width: 100%;
            max-width: 1024px;
            min-height: 560px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 18px 38px rgba(31, 122, 100, 0.14);
            display: grid;
            grid-template-columns: 1.1fr 1fr;
        }

        .logo-zone {
            background: linear-gradient(155deg, #e7f6ef 0%, #d8efe5 100%);
            padding: 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 18px;
        }

        .logo-zone img {
            width: min(85%, 340px);
            max-height: 320px;
            object-fit: contain;
        }

        .logo-zone h1 {
            margin: 0;
            font-size: 2.4rem;
            letter-spacing: 0.03em;
        }

        .logo-zone p {
            margin: 0;
            color: var(--muted);
            font-size: 1.02rem;
        }

        .form-zone {
            padding: 46px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-zone h2 {
            margin: 0 0 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 122, 100, 0.16);
        }

        .error {
            margin: 0 0 16px;
            color: #b22929;
            font-weight: 600;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        @media (max-width: 900px) {
            .login-shell {
                grid-template-columns: 1fr;
            }

            .logo-zone {
                padding: 28px 24px;
            }

            .logo-zone img {
                width: min(70%, 240px);
                max-height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="login-shell">
    <section class="logo-zone">
        <img src="/images/logo.png" alt="SimpleCD Logo">
        <h1>SimpleCD</h1>
        <p>Continuous Delivery Dashboard</p>
    </section>

    <section class="form-zone">
        <h2>Sign In</h2>
        <p class="subtitle">Use your admin account to continue.</p>

        <p th:if="${error}" th:text="${error}" class="error"></p>

        <form method="post" action="/login">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" required autocomplete="username">

            <label for="password">Password</label>
            <input id="password" type="password" name="password" required autocomplete="current-password">

            <button type="submit">Login</button>
        </form>
    </section>
</div>

</body>
</html>
