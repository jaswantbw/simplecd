<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SimpleCD Logs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #f4f7f6;
            --panel: #ffffff;
            --text: #18312d;
            --muted: #5d746f;
            --accent: #1f7a64;
            --accent-dark: #155646;
            --border: #d2dfdb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at 12% 18%, #dff2ea 0%, #dff2ea 22%, transparent 23%),
                radial-gradient(circle at 88% 82%, #e7f5ef 0%, #e7f5ef 20%, transparent 21%),
                var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1150px;
            margin: 0 auto;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(31, 122, 100, 0.08);
            padding: 22px;
            margin-bottom: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .logo { height: 58px; }

        .header h1 {
            margin: 0;
            font-size: 1.55rem;
        }

        .logout {
            margin-left: auto;
            color: var(--accent-dark);
            font-weight: 700;
            text-decoration: none;
        }

        .logout:hover { text-decoration: underline; }

        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 8px 0 8px;
        }

        .tab-link {
            text-decoration: none;
            color: var(--accent-dark);
            background: #e8f4ef;
            border: 1px solid #c8e2d8;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .tab-link:hover {
            background: #d9eee6;
        }

        .meta {
            margin: 0 0 12px;
            color: var(--muted);
        }

        #logBox {
            background: #102621;
            color: #aef8d7;
            border: 1px solid #21463d;
            border-radius: 12px;
            padding: 15px;
            height: 500px;
            overflow: auto;
            margin: 0;
            font-family: Consolas, "Courier New", monospace;
        }

        .back-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--accent-dark);
            font-weight: 700;
        }

        @media (max-width: 780px) {
            body { padding: 12px; }

            .header h1 { font-size: 1.25rem; }

            .logo { height: 48px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <img src="/images/logo.png" alt="Logo" class="logo">
            <h1>Build Logs</h1>
            <a href="/logout" class="logout">Logout</a>
        </div>

        <div class="nav-tabs">
            <a href="/#code-repository" class="tab-link">Code Repository</a>
            <a href="/#pipeline" class="tab-link">Pipeline</a>
            <a href="/#artifact" class="tab-link">Artifact</a>
            <a href="/#log" class="tab-link">Log</a>
        </div>
    </div>

    <div class="card">
        <p class="meta">
            <b>Job ID:</b> <span th:text="${job.jobId}"></span><br>
            <b>Status:</b> <span th:text="${job.status}"></span>
        </p>

        <pre id="logBox">Loading logs...</pre>

        <a href="/" class="back-link">Back</a>
    </div>
</div>

<script th:inline="javascript">
    const jobId = /*[[${job.jobId}]]*/ "";

    function loadLogs() {
        fetch("/api/logs/" + jobId)
            .then(response => response.text())
            .then(data => {
                const logBox = document.getElementById("logBox");
                logBox.textContent = data;
                logBox.scrollTop = logBox.scrollHeight;
            });
    }

    setInterval(loadLogs, 2000);
    loadLogs();
</script>

</body>
</html>
